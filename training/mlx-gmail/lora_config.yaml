model: "WeiboAI/VibeThinker-3B"
train: true
data: "data"
fine_tune_type: lora
optimizer: adamw
seed: 42
num_layers: 36
batch_size: 1
iters: 300
max_seq_length: 512
grad_checkpoint: true
learning_rate: 8.0e-5
lr_schedule:
  name: cosine_decay
  warmup: 30
  warmup_init: 1.0e-6
  arguments: [8.0e-5, 300, 1.0e-6]
mask_prompt: true
steps_per_report: 5
steps_per_eval: 25
val_batches: 5
save_every: 25
adapter_path: "adapters/gmail-agent"
lora_parameters:
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
  rank: 16
  scale: 16.0
  dropout: 0.0
