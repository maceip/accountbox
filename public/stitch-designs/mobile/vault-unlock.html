<body class="min-h-screen flex flex-col items-center justify-center p-md relative overflow-hidden">
<!-- Background grid for hardware aesthetic -->
<div class="absolute inset-0 pointer-events-none opacity-5" style="background-image: linear-gradient(#23252a 1px, transparent 1px), linear-gradient(90deg, #23252a 1px, transparent 1px); background-size: 20px 20px;"></div>
<main class="w-full max-w-sm flex flex-col gap-lg z-10">
<!-- Logo Header -->
<header class="flex flex-col items-center justify-center mb-lg">
<div class="w-16 h-16 rounded-DEFAULT bg-surface-container-high flex items-center justify-center border hairline-border mb-md relative overflow-hidden group cursor-default">
<!-- Subtle glow effect on hover -->
<div class="absolute inset-0 bg-primary-container opacity-0 group-hover:opacity-10 transition-opacity duration-300"></div>
<span class="material-symbols-outlined text-primary-container" data-icon="lock_open" style="font-size: 32px; font-variation-settings: 'FILL' 1;">lock</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tighter">AccountBox</h1>
<p class="font-label-caps text-label-caps text-on-surface-variant mt-sm">SECURE VAULT ACCESS</p>
</header>
<!-- Login Form Container -->
<form class="flex flex-col gap-md p-md bg-surface border hairline-border rounded-lg relative">
<!-- Decorative corner brackets -->
<div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-primary-container -translate-x-px -translate-y-px"></div>
<div class="absolute top-0 right-0 w-2 h-2 border-t border-r border-primary-container translate-x-px -translate-y-px"></div>
<div class="absolute bottom-0 left-0 w-2 h-2 border-b border-l border-primary-container -translate-x-px translate-y-px"></div>
<div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-primary-container translate-x-px translate-y-px"></div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant flex items-center gap-xs" for="master-password">
<span class="material-symbols-outlined text-[14px]" data-icon="key">key</span>
                    MASTER PASSWORD
                </label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-b hairline-border focus-ring-primary font-code-sm text-code-sm text-on-surface p-sm pl-md rounded-none placeholder:text-on-surface-variant/50 transition-colors" id="master-password" placeholder="Enter 64-bit key..." required="" type="password"/>
<!-- Small status indicator -->
<div class="absolute right-3 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-error" id="auth-status-indicator"></div>
</div>
</div>
<button class="mt-sm w-full bg-primary-container text-on-primary-container font-title-sm text-title-sm py-sm rounded-DEFAULT flex justify-center items-center gap-sm hover:bg-primary-container/90 active:scale-[0.98] transition-all" type="submit">
<span class="material-symbols-outlined" data-icon="login">login</span>
                UNLOCK VAULT
            </button>
</form>
<!-- Technical Telemetry Footer -->
<footer class="mt-lg flex flex-col items-center gap-xs text-center border-t hairline-border pt-md">
<p class="font-code-sm text-code-sm text-on-surface-variant/70 flex items-center gap-sm">
<span class="w-2 h-2 bg-error rounded-full inline-block animate-pulse"></span>
                VAULT_LOCKED // KEY_AUTH_REQUIRED
            </p>
<p class="font-label-caps text-label-caps text-on-surface-variant/40">
                SYS_VER: 2.4.1 | ENCRYPTION: AES-256-GCM
            </p>
</footer>
</main>
<script>
        // Simple micro-interaction for the input field to change the indicator color when typing
        const passwordInput = document.getElementById('master-password');
        const statusIndicator = document.getElementById('auth-status-indicator');

        passwordInput.addEventListener('input', (e) => {
            if (e.target.value.length > 0) {
                statusIndicator.classList.remove('bg-error');
                statusIndicator.classList.add('bg-secondary-container'); // turns teal-ish when typing
            } else {
                statusIndicator.classList.remove('bg-secondary-container');
                statusIndicator.classList.add('bg-error');
            }
        });
    </script>
